stages:
  - format
  - lint
  - type_check
  - test
  - coverage
  - security
  - audit
  - changelog

before_script:
  - python -m pip install --upgrade pip

default:
  image: python:3.11-slim
  tags:
    - docker

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  policy: pull-push
  paths:
    - .cache/pip
    - .venv/

# ── Format Stage ──────────────────────────────────────────────

ruff-format:
  stage: format
  script:
    - pip install ruff
    - ruff format --check --line-length=88 src/ tests/
  allow_failure: false

# ── Lint Stage ────────────────────────────────────────────────

ruff:
  stage: lint
  script:
    - pip install ruff
    - ruff check src/ tests/
  allow_failure: false

isort:
  stage: lint
  script:
    - pip install isort
    - isort --check-only --profile=black --line-length=88 src/ tests/
  allow_failure: false

pylint:
  stage: lint
  script:
    - pip install pylint
    - pylint src/ --fail-under=7.0 || true
  allow_failure: true

flake8:
  stage: lint
  script:
    - pip install flake8
    - flake8 src/ tests/ --max-line-length=88
  allow_failure: true

# ── Type Check Stage ──────────────────────────────────────────

mypy:
  stage: type_check
  script:
    - pip install -r requirements.txt
    - pip install mypy
    - mypy --strict --ignore-missing-imports src/
  allow_failure: true

# ── Test Stage ────────────────────────────────────────────────

pytest:
  stage: test
  script:
    - pip install -r requirements.txt
    - pip install pytest pytest-cov
    - pytest --cov=src/ --cov-report=term --cov-report=html tests/
  artifacts:
    paths:
      - htmlcov/
    expire_in: 30 days

# ── Coverage Stage ────────────────────────────────────────────

coverage:
  stage: coverage
  script:
    - pip install -r requirements.txt
    - pip install pytest pytest-cov
    - pytest --cov=src/ --cov-report=term --cov-report=html --cov-fail-under=0 tests/
  allow_failure: true
  artifacts:
    paths:
      - htmlcov/
    expire_in: 30 days

# ── Security Stage ────────────────────────────────────────────

bandit:
  stage: security
  script:
    - pip install bandit
    - bandit -ll -q -r src/
  allow_failure: true

vulture:
  stage: security
  script:
    - pip install vulture
    - vulture src/ --min-confidence 80
  allow_failure: true

detect-secrets:
  stage: security
  script:
    - pip install detect-secrets
    - detect-secrets scan --baseline .secrets.baseline || echo "No baseline"
  allow_failure: true

semgrep:
  stage: security
  script:
    - pip install semgrep
    - semgrep --config=auto --error --quiet src/ || true
  allow_failure: true

# ── Audit Stage ───────────────────────────────────────────────

pip-audit:
  stage: audit
  script:
    - pip install pip-audit
    - pip-audit --requirement requirements.txt --ignore-vuln CVE-2025-69872
  allow_failure: true