stages:
  - format
  - lint
  - type_check
  - test
  - coverage
  - security

default:
  image: python:3.11-slim
  tags:
    - docker

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip
    - .venv/

before_script:
  - python -m pip install --upgrade pip
  - pip install -r requirements.txt

# ── Format Stage ──────────────────────────────────────────────

ruff-format:
  stage: format
  script:
    - pip install ruff
    - ruff format --check --line-length=88 src/ tests/
  allow_failure: false

# ── Lint Stage ────────────────────────────────────────────────

ruff:
  stage: lint
  script:
    - pip install ruff
    - ruff check src/ tests/
  allow_failure: false

black:
  stage: lint
  script:
    - pip install black
    - black --check --line-length=88 src/ tests/
  allow_failure: false

isort:
  stage: lint
  script:
    - pip install isort
    - isort --check-only --profile=black --line-length=88 src/ tests/
  allow_failure: false

# ── Type Check Stage ──────────────────────────────────────────

mypy:
  stage: type_check
  script:
    - pip install mypy
    - mypy --strict --ignore-missing-imports src/
  allow_failure: true

# ── Test Stage ────────────────────────────────────────────────

pytest:
  stage: test
  script:
    - pip install pytest pytest-cov
    - pytest --cov=src/ --cov-report=term --cov-report=html tests/
  artifacts:
    paths:
      - htmlcov/
    expire_in: 30 days

# ── Coverage Stage ────────────────────────────────────────────

coverage:
  stage: coverage
  script:
    - pip install pytest pytest-cov
    - pytest --cov=src/ --cov-report=term --cov-report=html --cov-fail-under=80 tests/
  allow_failure: true
  artifacts:
    paths:
      - htmlcov/
    expire_in: 30 days

# ── Security Stage ────────────────────────────────────────────

bandit:
  stage: security
  script:
    - pip install bandit
    - bandit -ll -q -r src/
  allow_failure: true

vulture:
  stage: security
  script:
    - pip install vulture
    - vulture src/ --min-confidence 80
  allow_failure: true

detect-secrets:
  stage: security
  script:
    - pip install detect-secrets
    - detect-secrets scan --baseline .secrets.baseline || echo "No baseline"
  allow_failure: true